services:
  db:
    image: postgres:16-alpine
    container_name: tramplin_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tramplin_db}
      POSTGRES_USER: ${POSTGRES_USER:-tramplin_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tramplin_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tramplin_user} -d ${POSTGRES_DB:-tramplin_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: tramplin_backend
    environment:
      DJANGO_DEBUG: ${DJANGO_DEBUG:-1}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-dev-secret-key-change-me}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-127.0.0.1,localhost}
      DB_ENGINE: postgres
      POSTGRES_DB: ${POSTGRES_DB:-tramplin_db}
      POSTGRES_USER: ${POSTGRES_USER:-tramplin_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tramplin_password}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app

volumes:
  postgres_data:
